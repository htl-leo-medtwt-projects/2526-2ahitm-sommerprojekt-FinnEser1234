<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The last Case</title>

    <link rel="stylesheet" href="../CSS/style.css">
    <script src="../JS/script.js" defer></script>
</head>
<body id="gameBody">
    <a href="../index.html" class="gameBack" aria-label="Zur Startseite">
        <img src="../IMG/x.png" alt="Back Button" id="gameBackBtn">
    </a>

    <main class="gameShell">
        <h1>The Last Case</h1>
        <p id="detectiveGreeting">Please verify yourself!</p>
        <button type="button" id="caseStartBtn" class="caseStartButton" disabled>Start case</button>
    </main>

    <section id="gameSetupModal" class="gameModal" aria-modal="true" role="dialog">
        <form id="gameSetupForm" class="gameModalCard">
            <h2>Case signing</h2>
            <p>Please enter your detectiv name</p>

            <label for="detectiveName">Name</label>
            <input id="detectiveName" name="detectiveName" type="text" maxlength="24" placeholder="z. B. Finn" required>

            <p id="setupError" class="setupErrorText" aria-live="polite"></p>

            <button type="submit" class="caseStartButton">Sign and start</button>
        </form>
    </section>

    <section id="levelOne" class="levelSection levelHidden" aria-label="Erstes Level im Wissenschaftsraum">
        <div class="scienceRoom">
            <button type="button" id="pinboardFocusBtn" class="pinboardFocusBtn" aria-label="Pinnwand untersuchen">
                Pinnwand untersuchen
            </button>

            <button type="button" id="deskLetterBtn" class="deskLetterBtn" aria-label="Brief auf dem Schreibtisch ansehen">
                Brief
            </button>
        </div>
    </section>

    <section id="pinboardOverlay" class="pinboardOverlay pinboardOverlayHidden" aria-modal="true" role="dialog" aria-label="Pinnwand Hinweise">
        <button type="button" id="pinboardCloseBtn" class="pinboardCloseBtn" aria-label="Pinnwand schließen">
            Zurueck
        </button>

        <div class="pinboardSurface"></div>
    </section>

    <article id="letterNoteCard" class="letterNoteCard letterNoteHidden" aria-live="polite">
        <h2>Wichtige Info</h2>
        <p id="letterNoteText"></p>
        <button type="button" id="closeLetterNote" class="caseStartButton">Schliessen</button>
    </article>

    <button type="button" id="inventoryToggle" class="inventoryToggle" aria-label="Inventar oeffnen">
        <img src="../IMG/Lederrucksack.png" alt="Inventar Tasche">
    </button>

    <aside id="inventoryPanel" class="inventoryPanel inventoryHidden" aria-label="Inventar">
        <h2>Inventar</h2>

        <div id="pinboardItem" class="inventoryItem inventoryItemLocked">
            <span class="inventoryIcon inventoryIconMagnifier" aria-hidden="true"></span>
            <div>
                <p class="inventoryItemTitle">Pinnwand Karte</p>
                <p class="inventoryItemMeta">Noch nicht gefunden</p>
            </div>
        </div>

        <div id="letterItem" class="inventoryItem inventoryItemLocked">
            <span class="inventoryIcon inventoryIconLetter" aria-hidden="true"></span>
            <div>
                <p class="inventoryItemTitle">Brief</p>
                <p class="inventoryItemMeta">Noch nicht gefunden</p>
            </div>
        </div>
    </aside>
</body>
</html>

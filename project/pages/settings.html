<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <section id="settingsPage">
        <div class="settings-card">
            <div class="settings-grid">
                <div class="slider-group">
                    <label for="sfxRange">SFX</label>
                    <div class="range-row">
                        <span>-</span>
                        <input id="sfxRange" type="range" min="0" max="100" value="72">
                        <span>+</span>
                    </div>
                </div>

                <div class="slider-group">
                    <label for="musicRange">Musik</label>
                    <div class="range-row">
                        <span>-</span>
                        <input id="musicRange" type="range" min="0" max="100" value="84">
                        <span>+</span>
                    </div>
                </div>

                <div class="slider-group">
                    <label for="speechRange">Sprache</label>
                    <div class="range-row">
                        <span>-</span>
                        <input id="speechRange" type="range" min="0" max="100" value="23">
                        <span>+</span>
                    </div>
                </div>

                <div class="language-box" aria-label="Sprachauswahl">
                    <button class="language-btn active" type="button">Deutsch</button>
                    <button class="language-btn" type="button">Englisch</button>
                    <button class="language-btn" type="button">Italienisch</button>
                    <button class="language-btn" type="button">Russisch</button>
                    <button class="language-btn" type="button">Turkisch</button>
                </div>

                <div class="slider-group slider-wide">
                    <label for="allRange">Alles</label>
                    <div class="range-row">
                        <span>-</span>
                        <input id="allRange" type="range" min="0" max="100" value="35">
                        <span>+</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="settings-card saves-card">
            <h2>Speicherst&auml;nde</h2>
            <div class="saves-table" role="table" aria-label="Speicherstaende">
                <button class="save-row active" type="button" role="row">
                    <span>Spielstand1</span>
                    <span>Name</span>
                    <span>99%</span>
                </button>
                <button class="save-row" type="button" role="row">
                    <span>Spielstand1</span>
                    <span>Name</span>
                    <span>99%</span>
                </button>
                <button class="save-row" type="button" role="row">
                    <span>Spielstand1</span>

                    <span>99%</span>
                </button>
                <button class="save-row" type="button" role="row">

                </button>
                <button class="save-row" type="button" role="row">

                    <span>99%</span>
                </button>
                <button class="save-row" type="button" role="row">
                    <span>Spielstand1</span>
                    <span>Name</span>
                    <span>99%</span>
                </button>
                <button class="save-row" type="button" role="row">
                    <span>Spielstand1</span>
                    <span>Name</span>
                    <span>99%</span>
                </button>
            </div>
        </div>

        <footer id="settingsFooter">
            <div class="footer-col">
                <h3>Socials</h3>
                <a href="https://instagram.com" target="_blank" rel="noopener noreferrer">Instagram</a>
                <a href="https://snapchat.com" target="_blank" rel="noopener noreferrer">Snapchat</a>
